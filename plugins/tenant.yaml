apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: tenant
spec:
  version: v0.0.3
  homepage: https://github.com/stakater/kubectl-tenant
  shortDescription: Tenant-scoped operations for Stakater Multi-Tenant Operator
  description: |
    kubectl-tenant extends kubectl with the `tenant` command group for
    interacting with Stakater Multi-Tenant Operator (MTO).

    It lets users list tenants they belong to and fetch tenant-scoped
    cluster resources (namespaces, storageclasses, ingressclasses,
    priorityclasses, quotas) with tenant access validation, overcoming
    the limitation of Kubernetes RBAC on `list` for cluster-scoped
    resources without exposing resources to tenants that have no
    access to them.
  caveats: |
    This plugin requires Stakater Multi-Tenant Operator (MTO) to be
    installed in the target cluster.
    See https://docs.stakater.com/mto for installation instructions.
  platforms:
    - selector:
        matchLabels:
          os: linux
          arch: amd64
      uri: https://github.com/stakater/kubectl-tenant/releases/download/v0.0.3/kubectl-tenant_v0.0.3_linux_amd64.tar.gz
      sha256: 3b155e8a84d931c40ea38b9e09b877b65cbf5027fa10cc759e7c1f9dd71d6735
      files:
        - from: kubectl-tenant
          to: .
        - from: LICENSE
          to: .
      bin: kubectl-tenant
    - selector:
        matchLabels:
          os: linux
          arch: arm64
      uri: https://github.com/stakater/kubectl-tenant/releases/download/v0.0.3/kubectl-tenant_v0.0.3_linux_arm64.tar.gz
      sha256: e2df3bd0befa9a17a18ff33310c533908d1a2720344f2da6c47eeb7e33ba1310
      files:
        - from: kubectl-tenant
          to: .
        - from: LICENSE
          to: .
      bin: kubectl-tenant
    - selector:
        matchLabels:
          os: linux
          arch: "386"
      uri: https://github.com/stakater/kubectl-tenant/releases/download/v0.0.3/kubectl-tenant_v0.0.3_linux_386.tar.gz
